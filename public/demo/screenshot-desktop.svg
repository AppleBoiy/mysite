<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#grad1)"/>
  
  <!-- Browser Chrome -->
  <rect x="50" y="50" width="1100" height="40" rx="8" fill="#2d3748" opacity="0.9"/>
  <circle cx="80" cy="70" r="6" fill="#fc5c65"/>
  <circle cx="105" cy="70" r="6" fill="#fed330"/>
  <circle cx="130" cy="70" r="6" fill="#26de81"/>
  
  <!-- Content Area -->
  <rect x="50" y="90" width="1100" height="535" rx="0 0 8 8" fill="#ffffff" opacity="0.95"/>
  
  <!-- Header -->
  <rect x="80" y="120" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <rect x="950" y="120" width="180" height="30" rx="15" fill="#667eea"/>
  
  <!-- Content Blocks -->
  <rect x="80" y="180" width="500" height="20" rx="4" fill="#cbd5e0"/>
  <rect x="80" y="210" width="450" height="20" rx="4" fill="#cbd5e0"/>
  <rect x="80" y="240" width="480" height="20" rx="4" fill="#cbd5e0"/>
  
  <rect x="80" y="290" width="340" height="200" rx="8" fill="#e2e8f0"/>
  <rect x="440" y="290" width="340" height="200" rx="8" fill="#e2e8f0"/>
  <rect x="800" y="290" width="340" height="200" rx="8" fill="#e2e8f0"/>
  
  <!-- Footer -->
  <rect x="80" y="520" width="1040" height="80" rx="8" fill="#f7fafc"/>
  
  <!-- Text Label -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="48" fill="#2d3748" text-anchor="middle" opacity="0.3">
    Desktop View
  </text>
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="24" fill="#4a5568" text-anchor="middle" opacity="0.3">
    1200 × 675
  </text>
</svg>
